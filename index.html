<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilingual Text Alignment Viewer with TTS</title>

    <!-- Puter.js for enhanced TTS (optional fallback) -->
    <script src="https://js.puter.com/v2/"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .viewer-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .viewer-header h1 {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* TTS Controls */
        .tts-controls,
        .tts-controls-header {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .mobile-bottom-bar {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 16px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.2);
            z-index: 100;
            align-items: center;
            justify-content: center;
            gap: 16px;
            min-height: 56px;
        }

        .mobile-bottom-bar .tts-button {
            min-width: 44px;
            min-height: 44px;
            padding: 12px 24px;
            font-size: 18px;
        }

        .tts-button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tts-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .tts-button:active {
            transform: translateY(0);
        }

        .tts-button.playing {
            background: #27ae60;
            border-color: #27ae60;
            animation: pulse 1.5s infinite;
        }

        .tts-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .tts-settings {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
        }

        .tts-settings.visible {
            display: block;
        }

        .tts-setting-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .tts-setting-row:last-child {
            margin-bottom: 0;
        }

        .tts-setting-row label {
            min-width: 80px;
            font-size: 14px;
        }

        .tts-setting-row select,
        .tts-setting-row input[type="range"] {
            flex: 1;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .tts-setting-row select {
            cursor: pointer;
        }

        .tts-setting-row select option {
            background: #667eea;
            color: white;
        }

        .language-labels {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
        }

        .lang-label {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .lang-label.reading {
            background: #27ae60;
            animation: pulse 1.5s infinite;
        }

        .viewer-content {
            display: flex;
            min-height: 600px;
            position: relative;
            transition: transform 0.3s ease;
            will-change: transform;
        }

        .text-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-height: 700px;
        }

        .source-panel {
            background: #f8f9fa;
        }

        .target-panel {
            background: #ffffff;
        }

        .divider {
            width: 2px;
            background: linear-gradient(to bottom, #667eea, #764ba2);
            flex-shrink: 0;
        }

        .segment {
            margin-bottom: 24px;
            line-height: 2;
            font-size: 18px;
            color: #2d3748;
        }

        .lexeme {
            cursor: pointer;
            padding: 4px 2px;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: inline-block;
            position: relative;
        }

        .lexeme:hover {
            background: #ffd70020;
            transform: translateY(-1px);
        }

        .lexeme.selected {
            background: #ffd700;
            color: #2d3748;
            font-weight: 600;
            padding: 4px 8px;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }

        .lexeme.highlighted {
            background: #90cdf4;
            color: #1a365d;
            font-weight: 500;
            padding: 4px 8px;
            box-shadow: 0 2px 8px rgba(144, 205, 244, 0.4);
        }

        .lexeme.speaking {
            background: #48bb78;
            color: white;
            font-weight: 600;
            padding: 4px 8px;
            animation: speaking-pulse 0.5s infinite alternate;
        }

        @keyframes speaking-pulse {
            from {
                transform: scale(1);
                box-shadow: 0 2px 8px rgba(72, 187, 120, 0.4);
            }

            to {
                transform: scale(1.08);
                box-shadow: 0 4px 12px rgba(72, 187, 120, 0.6);
            }
        }

        /* File picker styles */
        .file-picker-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            padding: 40px;
        }

        .file-picker-section.hidden {
            display: none;
        }

        .file-picker-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }

        .file-picker-container h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .file-picker-container p {
            color: #718096;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .file-input-label {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        #fileInputViewer {
            display: none;
        }

        .selected-file-info {
            margin-top: 15px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 6px;
            color: #2d3748;
            font-size: 14px;
            display: none;
        }

        .selected-file-info.visible {
            display: block;
        }

        .demo-link {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .demo-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        /* Mobile: paging mode, no vertical scroll, bottom bar */
        @media (max-width: 768px) {

            html,
            body {
                height: 100%;
                overflow: hidden;
            }

            body {
                padding: 0;
            }

            #app {
                border-radius: 0;
                box-shadow: none;
                max-width: none;
            }

            .viewer-header {
                padding: 16px 12px;
            }

            .viewer-header h1 {
                font-size: 20px;
                margin-bottom: 10px;
            }

            .viewer-content {
                flex-direction: column;
                min-height: 0;
                flex: 1;
                overflow: hidden;
                touch-action: pan-y;
            }

            .divider {
                height: 2px;
                width: 100%;
                flex-shrink: 0;
            }

            .text-panel {
                padding: 16px;
                max-height: none;
                overflow: hidden;
                overflow-y: hidden;
                flex: 1;
                min-height: 0;
                display: flex;
                flex-direction: column;
                justify-content: flex-start;
            }

            .text-panel .segment {
                font-size: 18px;
                line-height: 1.85;
                margin-bottom: 16px;
                text-wrap: balance;
            }

            .text-panel .segment:last-child {
                margin-bottom: 0;
            }

            .lexeme {
                padding: 8px 4px;
                min-height: 32px;
                transform: none !important;
                /* Disable transform on mobile to prevent animation jank */
            }

            .lexeme.selected {
                transform: none !important;
                padding: 8px 8px;
            }

            .lexeme.speaking {
                animation: mobile-speaking-pulse 0.3s infinite alternate;
            }

            @keyframes mobile-speaking-pulse {
                from {
                    opacity: 1;
                }

                to {
                    opacity: 0.85;
                }
            }

            .tts-controls-header {
                display: none;
            }

            .viewer-body-with-bar {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                min-height: 100dvh;
            }

            .viewer-content-wrap {
                flex: 1;
                min-height: 0;
                overflow: hidden;
            }

            .mobile-bottom-bar {
                display: flex;
                flex-shrink: 0;
            }
        }

        @media (min-width: 769px) {
            .mobile-bottom-bar {
                display: none;
            }
        }

        .text-panel::-webkit-scrollbar {
            width: 8px;
        }

        .text-panel::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .text-panel::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- File Picker Section -->
        <div id="filePickerSection" class="file-picker-section">
            <div class="file-picker-container">
                <h2>📖 Load Alignment File</h2>
                <p>Select a JSON file containing your bilingual text alignment data.</p>

                <div class="file-input-wrapper">
                    <label for="fileInputViewer" class="file-input-label">
                        📁 Choose JSON File
                    </label>
                    <input type="file" id="fileInputViewer" accept=".json,application/json">
                </div>

                <div id="selectedFileInfo" class="selected-file-info">
                    <strong>Selected:</strong> <span id="fileName"></span>
                </div>

                <div id="errorMessage" class="error-message">
                    <strong>Error:</strong> <span id="errorText"></span>
                </div>

                <div class="demo-link">
                    <p style="color: #718096; margin-bottom: 10px;">Don't have a file?</p>
                    <a href="#" id="loadDemoBtn">Load demo data instead</a>
                </div>
            </div>
        </div>

        <!-- Viewer Section -->
        <div id="viewerSection" style="display: none;" class="viewer-body-with-bar">
            <div class="viewer-header">
                <h1 id="viewerTitle">Bilingual Text Alignment</h1>

                <!-- TTS Controls (desktop: in header) -->
                <div id="ttsControlsHeader" class="tts-controls tts-controls-header">
                    <button id="ttsPlayPause" class="tts-button">
                        <span id="ttsIcon">▶️</span>
                        <span id="ttsText">Play</span>
                    </button>
                    <button id="ttsSettings" class="tts-button">⚙️</button>
                </div>

                <!-- TTS Settings Panel -->
                <div id="ttsSettingsPanel" class="tts-settings">
                    <div class="tts-setting-row">
                        <label>Voice:</label>
                        <select id="voiceSelect"></select>
                    </div>
                    <div class="tts-setting-row">
                        <label>Speed:</label>
                        <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1">
                        <span id="speedValue">1.0x</span>
                    </div>
                    <div class="tts-setting-row">
                        <label>Pitch:</label>
                        <input type="range" id="pitchRange" min="0.5" max="2" step="0.1" value="1">
                        <span id="pitchValue">1.0</span>
                    </div>
                </div>

                <div class="language-labels">
                    <div class="lang-label source-label" id="sourceLangLabel">SOURCE 🔊</div>
                    <div class="lang-label target-label" id="targetLangLabel">TARGET</div>
                </div>
            </div>

            <div class="viewer-content-wrap">
                <div class="viewer-content" id="viewerContent">
                    <div class="text-panel source-panel" id="sourcePanel"></div>
                    <div class="divider"></div>
                    <div class="text-panel target-panel" id="targetPanel"></div>
                </div>
            </div>

            <!-- Mobile: fixed bottom bar with TTS controls -->
            <div class="mobile-bottom-bar" id="mobileBottomBar">
                <button id="ttsPlayPauseMobile" class="tts-button" aria-label="Play / Pause">
                    <span id="ttsIconMobile">▶️</span>
                    <span id="ttsTextMobile">Play</span>
                </button>
                <button id="ttsSettingsMobile" class="tts-button" aria-label="TTS Settings">⚙️</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
