<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bilingual Text Alignment Viewer with TTS</title>

    <!-- Puter.js for enhanced TTS (optional fallback) -->
    <script src="https://js.puter.com/v2/"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        #app {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .viewer-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .viewer-header h1 {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* TTS Controls */
        .tts-controls {
            position: absolute;
            top: 20px;
            right: 30px;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .tts-button {
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid white;
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tts-button:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .tts-button:active {
            transform: translateY(0);
        }

        .tts-button.playing {
            background: #27ae60;
            border-color: #27ae60;
            animation: pulse 1.5s infinite;
        }

        .tts-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }
        }

        .tts-settings {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
            display: none;
        }

        .tts-settings.visible {
            display: block;
        }

        .tts-setting-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }

        .tts-setting-row:last-child {
            margin-bottom: 0;
        }

        .tts-setting-row label {
            min-width: 80px;
            font-size: 14px;
        }

        .tts-setting-row select,
        .tts-setting-row input[type="range"] {
            flex: 1;
            padding: 5px 10px;
            border-radius: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .tts-setting-row select {
            cursor: pointer;
        }

        .tts-setting-row select option {
            background: #667eea;
            color: white;
        }

        .language-labels {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
        }

        .lang-label {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
            letter-spacing: 1px;
        }

        .lang-label.reading {
            background: #27ae60;
            animation: pulse 1.5s infinite;
        }

        .viewer-content {
            display: flex;
            min-height: 600px;
            position: relative;
        }

        .text-panel {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            max-height: 700px;
        }

        .source-panel {
            background: #f8f9fa;
        }

        .target-panel {
            background: #ffffff;
        }

        .divider {
            width: 2px;
            background: linear-gradient(to bottom, #667eea, #764ba2);
            flex-shrink: 0;
        }

        .segment {
            margin-bottom: 24px;
            line-height: 2;
            font-size: 18px;
            color: #2d3748;
        }

        .lexeme {
            cursor: pointer;
            padding: 4px 2px;
            border-radius: 4px;
            transition: all 0.2s ease;
            display: inline-block;
            position: relative;
        }

        .lexeme:hover {
            background: #ffd70020;
            transform: translateY(-1px);
        }

        .lexeme.selected {
            background: #ffd700;
            color: #2d3748;
            font-weight: 600;
            padding: 4px 8px;
            box-shadow: 0 2px 8px rgba(255, 215, 0, 0.4);
            transform: scale(1.05);
        }

        .lexeme.highlighted {
            background: #90cdf4;
            color: #1a365d;
            font-weight: 500;
            padding: 4px 8px;
            box-shadow: 0 2px 8px rgba(144, 205, 244, 0.4);
        }

        .lexeme.speaking {
            background: #48bb78;
            color: white;
            font-weight: 600;
            padding: 4px 8px;
            animation: speaking-pulse 0.5s infinite alternate;
        }

        @keyframes speaking-pulse {
            from {
                transform: scale(1);
                box-shadow: 0 2px 8px rgba(72, 187, 120, 0.4);
            }

            to {
                transform: scale(1.08);
                box-shadow: 0 4px 12px rgba(72, 187, 120, 0.6);
            }
        }

        /* File picker styles */
        .file-picker-section {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            padding: 40px;
        }

        .file-picker-section.hidden {
            display: none;
        }

        .file-picker-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 500px;
        }

        .file-picker-container h2 {
            color: #2d3748;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .file-picker-container p {
            color: #718096;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .file-input-label {
            display: inline-block;
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .file-input-label:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        #fileInputViewer {
            display: none;
        }

        .selected-file-info {
            margin-top: 15px;
            padding: 12px;
            background: #f7fafc;
            border-radius: 6px;
            color: #2d3748;
            font-size: 14px;
            display: none;
        }

        .selected-file-info.visible {
            display: block;
        }

        .demo-link {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e2e8f0;
        }

        .demo-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .error-message.visible {
            display: block;
        }

        @media (max-width: 768px) {
            .viewer-content {
                flex-direction: column;
            }

            .divider {
                height: 2px;
                width: 100%;
            }

            .text-panel {
                padding: 20px;
                max-height: none;
            }

            .tts-controls {
                position: static;
                justify-content: center;
                margin-top: 15px;
            }
        }

        .text-panel::-webkit-scrollbar {
            width: 8px;
        }

        .text-panel::-webkit-scrollbar-track {
            background: #f1f1f1;
        }

        .text-panel::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="app">
        <!-- File Picker Section -->
        <div id="filePickerSection" class="file-picker-section">
            <div class="file-picker-container">
                <h2>📖 Load Alignment File</h2>
                <p>Select a JSON file containing your bilingual text alignment data.</p>

                <div class="file-input-wrapper">
                    <label for="fileInputViewer" class="file-input-label">
                        📁 Choose JSON File
                    </label>
                    <input type="file" id="fileInputViewer" accept=".json,application/json">
                </div>

                <div id="selectedFileInfo" class="selected-file-info">
                    <strong>Selected:</strong> <span id="fileName"></span>
                </div>

                <div id="errorMessage" class="error-message">
                    <strong>Error:</strong> <span id="errorText"></span>
                </div>

                <div class="demo-link">
                    <p style="color: #718096; margin-bottom: 10px;">Don't have a file?</p>
                    <a href="#" id="loadDemoBtn">Load demo data instead</a>
                </div>
            </div>
        </div>

        <!-- Viewer Section -->
        <div id="viewerSection" style="display: none;">
            <div class="viewer-header">
                <h1 id="viewerTitle">Bilingual Text Alignment</h1>

                <!-- TTS Controls -->
                <div class="tts-controls">
                    <button id="ttsPlayPause" class="tts-button">
                        <span id="ttsIcon">▶️</span>
                        <span id="ttsText">Play</span>
                    </button>
                    <button id="ttsSettings" class="tts-button">⚙️</button>
                </div>

                <!-- TTS Settings Panel -->
                <div id="ttsSettingsPanel" class="tts-settings">
                    <div class="tts-setting-row">
                        <label>Voice:</label>
                        <select id="voiceSelect"></select>
                    </div>
                    <div class="tts-setting-row">
                        <label>Speed:</label>
                        <input type="range" id="speedRange" min="0.5" max="2" step="0.1" value="1">
                        <span id="speedValue">1.0x</span>
                    </div>
                    <div class="tts-setting-row">
                        <label>Pitch:</label>
                        <input type="range" id="pitchRange" min="0.5" max="2" step="0.1" value="1">
                        <span id="pitchValue">1.0</span>
                    </div>
                </div>

                <div class="language-labels">
                    <div class="lang-label source-label" id="sourceLangLabel">SOURCE 🔊</div>
                    <div class="lang-label target-label" id="targetLangLabel">TARGET</div>
                </div>
            </div>

            <div class="viewer-content">
                <div class="text-panel source-panel" id="sourcePanel"></div>
                <div class="divider"></div>
                <div class="text-panel target-panel" id="targetPanel"></div>
            </div>
        </div>
    </div>

    <script src="BilingualTextMapper.js"></script>
    <script src="TextViewer.js"></script>
    <script>
        let mapper = null;
        let ttsManager = null;

        // Demo data
        const demoData = {
            "metadata": {
                "sourceLanguage": "en",
                "targetLanguage": "es",
                "title": "The Little Prince - Demo",
                "author": "Antoine de Saint-Exupéry"
            },
            "segments": [
                {
                    "id": "seg_1",
                    "source": [
                        { "id": "s1_0", "text": "Once", "alignments": ["t1_0"] },
                        { "id": "s1_1", "text": "upon", "alignments": ["t1_1"] },
                        { "id": "s1_2", "text": "a", "alignments": [] },
                        { "id": "s1_3", "text": "time", "alignments": ["t1_1"] },
                        { "id": "s1_4", "text": "I", "alignments": ["t1_2"] },
                        { "id": "s1_5", "text": "was", "alignments": ["t1_3"] },
                        { "id": "s1_6", "text": "six", "alignments": ["t1_4"] },
                        { "id": "s1_7", "text": "years", "alignments": ["t1_5"] },
                        { "id": "s1_8", "text": "old", "alignments": [] }
                    ],
                    "target": [
                        { "id": "t1_0", "text": "Una", "alignments": ["s1_0"] },
                        { "id": "t1_1", "text": "vez", "alignments": ["s1_1", "s1_3"] },
                        { "id": "t1_2", "text": "yo", "alignments": ["s1_4"] },
                        { "id": "t1_3", "text": "tenía", "alignments": ["s1_5"] },
                        { "id": "t1_4", "text": "seis", "alignments": ["s1_6"] },
                        { "id": "t1_5", "text": "años", "alignments": ["s1_7"] }
                    ]
                },
                {
                    "id": "seg_2",
                    "source": [
                        { "id": "s2_0", "text": "I", "alignments": ["t2_0"] },
                        { "id": "s2_1", "text": "saw", "alignments": ["t2_0"] },
                        { "id": "s2_2", "text": "a", "alignments": ["t2_1"] },
                        { "id": "s2_3", "text": "magnificent", "alignments": ["t2_2"] },
                        { "id": "s2_4", "text": "picture", "alignments": ["t2_3"] }
                    ],
                    "target": [
                        { "id": "t2_0", "text": "Vi", "alignments": ["s2_0", "s2_1"] },
                        { "id": "t2_1", "text": "una", "alignments": ["s2_2"] },
                        { "id": "t2_2", "text": "magnífica", "alignments": ["s2_3"] },
                        { "id": "t2_3", "text": "ilustración", "alignments": ["s2_4"] }
                    ]
                }
            ]
        };

        // Language code mapping for TTS
        const LANGUAGE_CODES = {
            'en': 'en-US',
            'es': 'es-ES',
            'fr': 'fr-FR',
            'de': 'de-DE',
            'it': 'it-IT',
            'pt': 'pt-PT',
            'ru': 'ru-RU',
            'zh': 'zh-CN',
            'ja': 'ja-JP',
            'ko': 'ko-KR',
            'ar': 'ar-SA',
            'hi': 'hi-IN'
        };

        // TTS Manager Class - Reads SOURCE language only
        class TTSManager {
            constructor(data) {
                this.data = data;
                this.isPlaying = false;
                this.isPaused = false;
                this.currentSegmentIndex = 0;
                this.voices = [];
                this.selectedVoice = null;
                this.rate = 1.0;
                this.pitch = 1.0;
                this.sourceLanguage = data.metadata.sourceLanguage || 'en';
                this.sourceLangCode = LANGUAGE_CODES[this.sourceLanguage] || 'en-US';

                this.initVoices();
                this.setupControls();
            }

            initVoices() {
                if ('speechSynthesis' in window) {
                    // Load voices
                    const loadVoices = () => {
                        this.voices = speechSynthesis.getVoices();
                        this.populateVoiceList();
                    };

                    loadVoices();

                    // Chrome loads voices asynchronously
                    if (speechSynthesis.onvoiceschanged !== undefined) {
                        speechSynthesis.onvoiceschanged = loadVoices;
                    }
                } else {
                    console.warn('Browser does not support Web Speech API');
                    alert('Your browser does not support text-to-speech. Please use Chrome, Edge, or Safari.');
                }
            }

            populateVoiceList() {
                const voiceSelect = document.getElementById('voiceSelect');
                voiceSelect.innerHTML = '';

                // Filter voices for SOURCE language only
                const languageVoices = this.voices.filter(voice =>
                    voice.lang.startsWith(this.sourceLanguage) ||
                    voice.lang.startsWith(this.sourceLangCode)
                );

                if (languageVoices.length === 0) {
                    // Fallback: try to find any English voice if source is English
                    const fallbackVoices = this.voices.filter(v => v.lang.startsWith('en'));
                    languageVoices.push(...fallbackVoices);
                }

                languageVoices.forEach((voice, index) => {
                    const option = document.createElement('option');
                    option.value = voice.name;
                    option.textContent = `${voice.name} (${voice.lang})`;
                    if (voice.default) {
                        option.selected = true;
                    }
                    voiceSelect.appendChild(option);
                });

                if (languageVoices.length > 0) {
                    this.selectedVoice = languageVoices[0];
                    console.log(`TTS initialized for ${this.sourceLanguage.toUpperCase()} with ${languageVoices.length} voice(s)`);
                } else {
                    console.warn(`No voices found for language: ${this.sourceLanguage}`);
                    // Use first available voice as fallback
                    this.selectedVoice = this.voices[0];
                }
            }

            setupControls() {
                const playPauseBtn = document.getElementById('ttsPlayPause');

                // Play/Pause button
                playPauseBtn.addEventListener('click', () => {
                    this.togglePlayPause();
                });

                // Settings button
                document.getElementById('ttsSettings').addEventListener('click', () => {
                    const panel = document.getElementById('ttsSettingsPanel');
                    panel.classList.toggle('visible');
                });

                // Voice selection
                document.getElementById('voiceSelect').addEventListener('change', (e) => {
                    this.selectedVoice = this.voices.find(v => v.name === e.target.value);
                    console.log('Voice changed to:', this.selectedVoice.name);
                });

                // Speed control
                document.getElementById('speedRange').addEventListener('input', (e) => {
                    this.rate = parseFloat(e.target.value);
                    document.getElementById('speedValue').textContent = this.rate.toFixed(1) + 'x';
                });

                // Pitch control
                document.getElementById('pitchRange').addEventListener('input', (e) => {
                    this.pitch = parseFloat(e.target.value);
                    document.getElementById('pitchValue').textContent = this.pitch.toFixed(1);
                });
            }

            togglePlayPause() {
                if (this.isPlaying) {
                    this.pause();
                } else {
                    this.play();
                }
            }

            play() {
                this.isPlaying = true;
                this.updatePlayButton(true);

                // Add visual indicator to source language label
                document.getElementById('sourceLangLabel').classList.add('reading');

                if (this.isPaused) {
                    this.isPaused = false;
                    speechSynthesis.resume();
                } else {
                    this.speakSourceText();
                }
            }

            pause() {
                this.isPlaying = false;
                this.isPaused = true;
                this.updatePlayButton(false);
                document.getElementById('sourceLangLabel').classList.remove('reading');
                speechSynthesis.pause();
            }

            stop() {
                this.isPlaying = false;
                this.isPaused = false;
                this.currentSegmentIndex = 0;
                this.updatePlayButton(false);
                this.clearHighlights();
                document.getElementById('sourceLangLabel').classList.remove('reading');
                speechSynthesis.cancel();
            }

            async speakSourceText() {
                const segments = this.data.segments;

                for (let i = this.currentSegmentIndex; i < segments.length; i++) {
                    if (!this.isPlaying) break;

                    this.currentSegmentIndex = i;
                    const segment = segments[i];
                    const sourceWords = segment.source;

                    // Collect SOURCE text for the segment
                    const segmentText = sourceWords.map(w => w.text).join(' ');

                    await this.speakWithWebAPI(segmentText, sourceWords);

                    // Small pause between segments
                    if (this.isPlaying) {
                        await this.sleep(300);
                    }
                }

                // Finished speaking all segments
                this.stop();
            }

            speakWithWebAPI(text, words) {
                return new Promise((resolve) => {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.voice = this.selectedVoice;
                    utterance.rate = this.rate;
                    utterance.pitch = this.pitch;
                    utterance.lang = this.sourceLangCode;

                    let wordIndex = 0;

                    // Highlight words as they're spoken
                    utterance.onboundary = (event) => {
                        if (event.name === 'word') {
                            // Clear previous highlight
                            this.clearHighlights();

                            // Highlight current word
                            if (wordIndex < words.length) {
                                const currentWord = words[wordIndex];
                                this.highlightWord(currentWord.id);

                                // Also highlight aligned target words
                                if (currentWord.alignments && currentWord.alignments.length > 0) {
                                    currentWord.alignments.forEach(targetId => {
                                        const targetElement = document.getElementById(targetId);
                                        if (targetElement) {
                                            targetElement.classList.add('highlighted');
                                        }
                                    });
                                }

                                wordIndex++;
                            }
                        }
                    };

                    utterance.onend = () => {
                        this.clearHighlights();
                        resolve();
                    };

                    utterance.onerror = (event) => {
                        console.error('Speech synthesis error:', event);
                        this.clearHighlights();
                        resolve();
                    };

                    speechSynthesis.speak(utterance);
                });
            }

            highlightWord(wordId) {
                const wordElement = document.getElementById(wordId);
                if (wordElement) {
                    wordElement.classList.add('speaking');

                    // Scroll into view if needed
                    wordElement.scrollIntoView({
                        behavior: 'smooth',
                        block: 'center',
                        inline: 'nearest'
                    });
                }
            }

            clearHighlights() {
                document.querySelectorAll('.speaking, .highlighted').forEach(el => {
                    el.classList.remove('speaking', 'highlighted');
                });
            }

            updatePlayButton(playing) {
                const button = document.getElementById('ttsPlayPause');
                const icon = document.getElementById('ttsIcon');
                const text = document.getElementById('ttsText');

                if (playing) {
                    button.classList.add('playing');
                    icon.textContent = '⏸️';
                    text.textContent = 'Pause';
                } else {
                    button.classList.remove('playing');
                    icon.textContent = '▶️';
                    text.textContent = 'Play';
                }
            }

            sleep(ms) {
                return new Promise(resolve => setTimeout(resolve, ms));
            }
        }

        // Initialize viewer with data
        function initializeViewer(data) {
            try {
                if (!data.metadata || !data.segments) {
                    throw new Error('Invalid JSON structure. Must contain "metadata" and "segments".');
                }

                const title = data.metadata.title || 'Bilingual Text Alignment';
                const sourceLang = (data.metadata.sourceLanguage || 'SOURCE').toUpperCase();
                const targetLang = (data.metadata.targetLanguage || 'TARGET').toUpperCase();

                document.getElementById('viewerTitle').textContent = title;
                document.getElementById('sourceLangLabel').innerHTML = `${sourceLang} 🔊`;
                document.getElementById('targetLangLabel').textContent = targetLang;

                mapper = new BilingualTextMapper(data);
                renderContent();

                // Initialize TTS for SOURCE language
                ttsManager = new TTSManager(data);

                document.getElementById('filePickerSection').classList.add('hidden');
                document.getElementById('viewerSection').style.display = 'block';

                console.log(`✅ Viewer initialized: ${title}`);
                console.log(`📢 TTS will read: ${sourceLang}`);
            } catch (error) {
                showError(error.message);
                throw error;
            }
        }

        function renderContent() {
            const segments = mapper.getSegments();
            const sourcePanel = document.getElementById('sourcePanel');
            const targetPanel = document.getElementById('targetPanel');

            segments.forEach(segment => {
                const sourcePara = document.createElement('p');
                sourcePara.className = 'segment';
                segment.source.forEach(lexeme => {
                    const span = createLexemeElement(lexeme);
                    sourcePara.appendChild(span);
                    sourcePara.appendChild(document.createTextNode(' '));
                });
                sourcePanel.appendChild(sourcePara);

                const targetPara = document.createElement('p');
                targetPara.className = 'segment';
                segment.target.forEach(lexeme => {
                    const span = createLexemeElement(lexeme);
                    targetPara.appendChild(span);
                    targetPara.appendChild(document.createTextNode(' '));
                });
                targetPanel.appendChild(targetPara);
            });

            attachClickHandlers();
        }

        function createLexemeElement(lexeme) {
            const span = document.createElement('span');
            span.className = 'lexeme';
            span.id = lexeme.id;
            span.textContent = lexeme.text;
            return span;
        }

        function attachClickHandlers() {
            const lexemes = document.querySelectorAll('.lexeme');

            lexemes.forEach(lexeme => {
                lexeme.addEventListener('click', (e) => {
                    mapper.highlightAlignment(e.target.id);
                });

                lexeme.addEventListener('mouseenter', (e) => {
                    if (!e.target.classList.contains('speaking')) {
                        e.target.style.background = '#ffd70020';
                    }
                });

                lexeme.addEventListener('mouseleave', (e) => {
                    if (!e.target.classList.contains('speaking') &&
                        !e.target.classList.contains('selected') &&
                        !e.target.classList.contains('highlighted')) {
                        e.target.style.background = '';
                    }
                });
            });

            document.addEventListener('click', (e) => {
                if (!e.target.classList.contains('lexeme') &&
                    !e.target.closest('.tts-controls') &&
                    !e.target.closest('.tts-settings')) {
                    if (mapper) mapper.clearHighlights();
                }
            });
        }

        // File input handler
        document.getElementById('fileInputViewer').addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            document.getElementById('fileName').textContent = file.name;
            document.getElementById('selectedFileInfo').classList.add('visible');
            hideError();

            const reader = new FileReader();

            reader.onload = (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    initializeViewer(data);
                } catch (error) {
                    showError(`Failed to parse JSON: ${error.message}`);
                }
            };

            reader.readAsText(file);
        });

        // Load demo button
        document.getElementById('loadDemoBtn').addEventListener('click', (e) => {
            e.preventDefault();
            hideError();
            initializeViewer(demoData);
        });

        function showError(message) {
            document.getElementById('errorText').textContent = message;
            document.getElementById('errorMessage').classList.add('visible');
        }

        function hideError() {
            document.getElementById('errorMessage').classList.remove('visible');
        }
    </script>
</body>

</html>
